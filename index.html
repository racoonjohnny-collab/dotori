<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>돌아와 도토리정원</title>
  </head>
  <body>
  <!-- 카카오 인앱 브라우저 → 크롬/사파리 강제 -->
  <script>
  (function() {
    const ua = navigator.userAgent.toLowerCase();
    const isKakao = ua.includes('kakaotalk');
    if (!isKakao) return;
    const isAndroid = ua.includes('android');
    const isIOS = /iphone|ipad|ipod/.test(ua);
    if (isAndroid) {
      if (location.href.includes('openExternalBrowser=1')) return;
      try {
        location.href = 'intent://' + location.host + location.pathname + location.search + '#Intent;scheme=https;package=com.android.chrome;end';
      } catch(e) {
        location.replace(location.href + (location.href.includes('?') ? '&' : '?') + 'openExternalBrowser=1');
      }
    } else if (isIOS) {
      document.addEventListener('DOMContentLoaded', function() {
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#ff8a3d;color:#fff;padding:16px;text-align:center;font-size:14px;';
        banner.innerHTML = '<div style="margin-bottom:8px;">🌰 Google 로그인을 위해 Safari에서 열어주세요</div><button onclick="location.href=\'x-web-search://?q=\'+encodeURIComponent(location.href)" style="background:#fff;color:#ff8a3d;border:none;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;">Safari로 열기</button><button onclick="this.parentElement.remove()" style="background:transparent;color:rgba(255,255,255,0.8);border:none;padding:8px 12px;font-size:13px;cursor:pointer;">닫기</button>';
        document.body.appendChild(banner);
      });
    }
  })();
  </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
